name: dart_vlc_example
description: Demonstrates how to use the dart_vlc plugin.
publish_to: "none"

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_vlc:
    path: ../

dependency_overrides:
  dart_vlc_ffi:
    path: ../ffi
  audio_video_progress_bar: ^2.0.3

  cupertino_icons: ^1.0.2
flutter:
  uses-material-design: true
